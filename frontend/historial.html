<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Historial</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <div class="logo">
        <a href="index.html"><img src="imagenes/logo1.png" alt="logo"></a>
    </div>
    <form class="buscador" action="busquedaProducto.html" method="GET">
        <input type="search" name="q" placeholder="Buscar productos..." required>
        <button type="submit">Buscar</button>
    </form>
    <div class="auth-buttons"></div>
</header>

<main style="padding: 20px; max-width: 800px; margin: auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>🕐 Mi Historial de Búsquedas</h2>
        <button onclick="limpiarHistorial()" 
            style="background:#e74c3c; color:white; border:none; padding:8px 16px;
                   border-radius:6px; cursor:pointer;">
            🗑 Limpiar todo
        </button>
    </div>
    <div id="lista-historial"></div>
</main>

<footer><p>© 2026 PriceCompare</p></footer>

<script src="script.js"></script>
<script>
const usuario = JSON.parse(localStorage.getItem("usuario") || "null");
if (!usuario) window.location.href = "/login.html";

async function cargarHistorial() {
    const contenedor = document.getElementById("lista-historial");
    try {
        const res = await fetch(`http://127.0.0.1:8000/historial/usuario/${usuario.id}`);
        const data = await res.json();

        if (data.length === 0) {
            contenedor.innerHTML = "<p>No tienes búsquedas recientes.</p>";
            return;
        }

        contenedor.innerHTML = "";
        data.forEach(item => {
            const fecha = new Date(item.fecha).toLocaleDateString("es-CO", {
                day: "2-digit", month: "short", year: "numeric",
                hour: "2-digit", minute: "2-digit"
            });
            contenedor.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center;
                            padding:12px 16px; margin-bottom:8px; background:white;
                            border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.08);">
                    <div>
                        <a href="busquedaProducto.html?q=${encodeURIComponent(item.busqueda)}"
                            style="font-weight:bold; color:#ff6b00; text-decoration:none; font-size:15px;">
                            🔍 ${item.busqueda}
                        </a>
                        <p style="margin:2px 0 0; font-size:12px; color:#888;">${fecha}</p>
                    </div>
                </div>
            `;
        });
    } catch(err) {
        contenedor.innerHTML = "<p>Error al cargar historial.</p>";
    }
}

async function limpiarHistorial() {
    // Crear modal
    const modal = document.createElement("div");
    modal.style.cssText = `
        position: fixed; inset: 0; background: rgba(0,0,0,0.5);
        display: flex; align-items: center; justify-content: center;
        z-index: 9999;
    `;
    modal.innerHTML = `
        <div style="background:white; border-radius:12px; padding:30px; 
                    max-width:380px; width:90%; text-align:center;
                    box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <div style="font-size:48px; margin-bottom:12px;">🗑️</div>
            <h3 style="margin:0 0 8px; color:#1e293b;">¿Eliminar historial?</h3>
            <p style="color:#64748b; margin:0 0 24px;">
                Se borrarán todas tus búsquedas recientes. Esta acción no se puede deshacer.
            </p>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button id="cancelar-modal"
                    style="padding:10px 24px; border-radius:8px; border:1px solid #e2e8f0;
                           background:white; cursor:pointer; font-size:14px; color:#64748b;">
                    Cancelar
                </button>
                <button id="confirmar-modal"
                    style="padding:10px 24px; border-radius:8px; border:none;
                           background:#e74c3c; color:white; cursor:pointer; font-size:14px; font-weight:bold;">
                    Sí, eliminar
                </button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);

    document.getElementById("cancelar-modal").onclick = () => modal.remove();
    document.getElementById("confirmar-modal").onclick = async () => {
        modal.remove();
        await fetch(`http://127.0.0.1:8000/historial/usuario/${usuario.id}`, { method: "DELETE" });
        mostrarToast("Historial eliminado", "info");
        document.getElementById("lista-historial").innerHTML = "<p>No tienes búsquedas recientes.</p>";
    };
}

cargarHistorial();
</script>
</body>
</html>
