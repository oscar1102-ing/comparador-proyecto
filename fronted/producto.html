<!DOCTYPE html>

<html lang="es">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Detalle del producto</title>

        <link rel="icon" href="imagenes/logo1.png">
        <link rel="stylesheet" href="styles.css">

    </head>

    <body>

        <header>

            <div class="logo">
                <a href="index.html"><img src="imagenes/logo1.png" alt="logo"></a>
            </div>

            <form class="buscador" action="busquedaProducto.html" method="GET">

                <input type="search" name="q" placeholder="Buscar productos..." required>

                <button type="submit">Buscar</button>

            </form>

        </header>

        <nav>

            <ul>
                <li><a href="busquedaProducto.html?categoria=tecnologia">Tecnología</a></li>
                <li><a href="busquedaProducto.html?categoria=electrodomesticos">Electrodomésticos</a></li>
                <li><a href="busquedaProducto.html?categoria=celulares">Celulares</a></li>
                <li><a href="busquedaProducto.html?categoria=computadores">Computadores</a></li>
                <li><a href="busquedaProducto.html?categoria=accesorios">Accesorios</a></li>
            </ul>

        </nav>

        <main>

            <section class="producto-principal">

                <div class="imagenes-producto">

                    <img id="imagen">

                </div>

                <div class="info-producto">

                    <h2 id="nombre"></h2>

                </div>

            </section>

            <section class="otras-tiendas">
                <div class="oferta">
                    <h2>Otras tiendas con este producto</h2>
                </div>
                <article class="producto">

                    <div class="carrusel">

                        <div class="comparacion">

                            <div id="tiendas"></div>

                        </div>

                    </div>

                </article>

            </section>

            <section class="productos-similares">

                <div class="oferta">
                    <h2>Productos similares</h2>
                </div>

                <article class="producto">

                    <div class="carrusel">

                        <div class="comparacion">

                           <div id="similares"></div>

                        </div>

                    </div>

                </article>

            </section>

        </main>

        <footer>

            <p>© 2026 PriceCompare</p>
            <p>Comparador de precios de tiendas online</p>

        </footer>

        <script src="script.js"></script>

    </body>

</html>
